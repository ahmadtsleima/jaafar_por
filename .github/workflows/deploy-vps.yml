name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    name: Pull and restart on server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/home/jaafar-project/jaafar_por"
            PM2_APP="jaafar-portfolio"

            cd "$APP_DIR"

            git fetch origin main
            git reset --hard origin/main

            npm ci
            npm run build

            cd server
            npm ci --omit=dev
            mkdir -p uploads/photos uploads/videos

            cd "$APP_DIR"
            pm2 restart "$PM2_APP" --update-env || pm2 start server/index.js --name "$PM2_APP" --update-env
            pm2 save
