name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload, build, and restart on server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload files to VPS
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: >-
            -az --delete
            --exclude=.git/
            --exclude=.github/
            --exclude=node_modules/
            --exclude=server/node_modules/
            --exclude=dist/
            --exclude=.env
            --exclude=.env.local
            --exclude=.env.production
            --exclude=server/.env
            --exclude=server/db.sqlite
            --exclude=server/db.sqlite-shm
            --exclude=server/db.sqlite-wal
            --exclude=server/uploads/
          path: ./
          remote_path: /home/jaafar-project/jaafar_por/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_port: ${{ secrets.VPS_PORT || 22 }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Install dependencies, rebuild, and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/home/jaafar-project/jaafar_por"
            PM2_APP="jaafar-portfolio"

            cd "$APP_DIR"

            npm ci
            npm run build

            cd server
            npm ci --omit=dev
            mkdir -p uploads/photos uploads/videos

            cd "$APP_DIR"
            pm2 restart "$PM2_APP" --update-env || pm2 start server/index.js --name "$PM2_APP" --update-env
            pm2 save
