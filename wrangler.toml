# Wrangler config for Cloudflare Workers / R2
# Fill in your account_id and bucket names before publishing.
name = "jaafarportof"
type = "javascript"
compatibility_date = "2026-06-04"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
main = "workers/index.js"

# Global vars available to all environments (override per env below)
[vars]
JWT_SECRET = ""
ADMIN_PASSWORD = ""
ADMIN_PASSWORD_HASH = ""
FRONTEND_URL = "https://your-frontend.example"

# Bind D1 and R2 to the Worker.
[[d1_databases]]
binding = "DB"
database_name = "portfolio_db"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "your_bucket_name"
preview_bucket_name = "your_bucket_name_preview"

# Development environment (used with `wrangler dev` and `--env dev`)
[env.dev]
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
[env.dev.vars]
FRONTEND_URL = "http://localhost:5173"
JWT_SECRET = "dev_jwt_secret"
[[env.dev.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "your_bucket_name_dev"
preview_bucket_name = "your_bucket_name_dev_preview"

# Production environment
[env.production]
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
[env.production.vars]
FRONTEND_URL = "https://your-frontend.example"
JWT_SECRET = "replace_with_production_jwt_secret"
[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "your_bucket_name"
preview_bucket_name = "your_bucket_name_preview"

# Optional: add routes if deploying to a specific domain
# routes = ["api.yourdomain.com/*"]
